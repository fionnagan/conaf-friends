name: Weekly Episode Ingest

on:
  schedule:
    # Every Monday at 9:00 AM EST (14:00 UTC)
    - cron: "0 14 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ingest pipeline
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npx tsx scripts/ingest/index.ts

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/guests.json data/cold-opens.json data/top-words.json data/word-guests.json data/guest-photos.json data/fans.json
          git diff --staged --quiet || git commit -m "chore: weekly episode ingest $(date -u '+%Y-%m-%d')"
          git push
